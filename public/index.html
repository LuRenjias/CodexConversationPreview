<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Conversation Preview</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="conversation-list">
        <header class="list-header">
          <div>
            <h1>Codex 对话</h1>
            <p id="sessionsDir">读取中...</p>
          </div>
          <button id="refreshButton" class="icon-button" title="刷新" aria-label="刷新">
            <span aria-hidden="true">↻</span>
          </button>
        </header>
        <label class="search-box">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="标题、路径、工作目录" />
        </label>
        <div id="conversationList" class="list-body" aria-live="polite"></div>
      </aside>

      <main class="conversation-detail">
        <section id="emptyState" class="empty-state">
          <h2>选择一条对话记录</h2>
          <p>左侧展示本地 Codex JSONL 会话，点击后查看完整对话。</p>
        </section>

        <section id="detailPanel" class="detail-panel hidden">
          <header class="detail-header">
            <div>
              <h2 id="detailTitle"></h2>
              <p id="detailMeta"></p>
            </div>
            <div class="detail-actions">
              <label class="toggle-control">
                <input id="supplementalToggle" type="checkbox" />
                <span>显示其他内容</span>
              </label>
              <div class="font-size-control" aria-label="字体大小">
                <button id="decreaseFontButton" class="font-button" title="减小字体" aria-label="减小字体">A-</button>
                <span id="fontSizeValue">12px</span>
                <button id="increaseFontButton" class="font-button" title="增大字体" aria-label="增大字体">A+</button>
              </div>
              <button id="copyPathButton" class="secondary-button">复制路径</button>
            </div>
          </header>
          <div id="messageStream" class="message-stream"></div>
        </section>
      </main>

      <aside id="anchorRail" class="anchor-rail hidden" aria-label="用户消息定位"></aside>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
